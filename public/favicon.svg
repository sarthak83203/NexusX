<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#AA00FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00E676;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0a0a0a"/>

  <!-- Main Shield with Glow -->
  <g filter="url(#glow)">
    <path d="M32 10 L50 16 L50 32 C50 42 44 50 32 56 C20 50 14 42 14 32 L14 16 Z"
          fill="url(#faviconGradient)" opacity="0.3"/>
    <path d="M32 10 L50 16 L50 32 C50 42 44 50 32 56 C20 50 14 42 14 32 L14 16 Z"
          stroke="url(#faviconGradient)" stroke-width="3" fill="none"/>
  </g>

  <!-- Inner Circuit Pattern -->
  <circle cx="32" cy="30" r="5" fill="#4285F4"/>
  <line x1="32" y1="25" x2="32" y2="18" stroke="#4285F4" stroke-width="2.5"/>
  <line x1="37" y1="30" x2="42" y2="30" stroke="#AA00FF" stroke-width="2.5"/>
  <line x1="27" y1="30" x2="22" y2="30" stroke="#00E676" stroke-width="2.5"/>
  <line x1="32" y1="35" x2="32" y2="42" stroke="#4285F4" stroke-width="2.5"/>

  <!-- Corner Nodes -->
  <circle cx="32" cy="18" r="2.5" fill="#4285F4"/>
  <circle cx="42" cy="30" r="2.5" fill="#AA00FF"/>
  <circle cx="22" cy="30" r="2.5" fill="#00E676"/>
  <circle cx="32" cy="42" r="2.5" fill="#4285F4"/>
</svg>
