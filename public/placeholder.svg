<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#AA00FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00E676;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#4285F4" opacity="0.05"/>
  <circle cx="1100" cy="530" r="200" fill="#AA00FF" opacity="0.05"/>

  <!-- Shield Logo -->
  <g transform="translate(200, 200)" filter="url(#glow)">
    <path d="M100 20 L180 50 L180 130 C180 180 150 210 100 240 C50 210 20 180 20 130 L20 50 Z"
          fill="url(#shieldGrad)" opacity="0.2"/>
    <path d="M100 20 L180 50 L180 130 C180 180 150 210 100 240 C50 210 20 180 20 130 L20 50 Z"
          stroke="url(#shieldGrad)" stroke-width="4" fill="none"/>

    <!-- Circuit pattern -->
    <circle cx="100" cy="110" r="12" fill="#4285F4"/>
    <line x1="100" y1="98" x2="100" y2="70" stroke="#4285F4" stroke-width="4"/>
    <line x1="112" y1="110" x2="140" y2="110" stroke="#AA00FF" stroke-width="4"/>
    <line x1="88" y1="110" x2="60" y2="110" stroke="#00E676" stroke-width="4"/>
    <line x1="100" y1="122" x2="100" y2="150" stroke="#4285F4" stroke-width="4"/>

    <circle cx="100" cy="70" r="5" fill="#4285F4"/>
    <circle cx="140" cy="110" r="5" fill="#AA00FF"/>
    <circle cx="60" cy="110" r="5" fill="#00E676"/>
    <circle cx="100" cy="150" r="5" fill="#4285F4"/>
  </g>

  <!-- Text -->
  <text x="450" y="280" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900" fill="#f0f0f0">
    NexusGuard
  </text>
  <text x="450" y="340" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="600" fill="#8888aa">
    AI-Powered UPI Fraud Detection
  </text>

  <!-- Feature badges -->
  <g transform="translate(450, 380)">
    <rect x="0" y="0" width="180" height="50" rx="25" fill="#4285F4" opacity="0.2"/>
    <text x="90" y="32" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#4285F4" text-anchor="middle">
      99.2% Accurate
    </text>
  </g>

  <g transform="translate(650, 380)">
    <rect x="0" y="0" width="200" height="50" rx="25" fill="#00E676" opacity="0.2"/>
    <text x="100" y="32" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#00E676" text-anchor="middle">
      Real-time Detection
    </text>
  </g>
</svg>